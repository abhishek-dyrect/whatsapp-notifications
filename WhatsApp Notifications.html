    { id:1,  ts:'Today, 9:41 AM',      customer:'Aarav Mehta',    event:'warranty.registered',  template:'warranty_registered', status:'read',      wamid:'wamid.ABGGFlCGg0cvBo9IK' },

const TABS = [
  { id:'overview',           label:'Overview' },
  { id:'notifications',label:'Notifications' },
  { id:'templates',          label:'Templates' },
  { id:'activity',           label:'Activity' },
];

/* buildInitialNotifData is provided by WA_EventNotifications.jsx */

function App() {
  const [tab, setTab]                     = useState('overview');
  const [events, setEvents]               = useState(SEED.events);
  const [templates, setTemplates]         = useState(SEED.templates);
  const [editingTemplate, setEditingTemplate] = useState(null);
  const [showWizard, setShowWizard]       = useState(false);
  const [showNewTemplate, setShowNewTemplate] = useState(false);
  const [channel, setChannel]             = useState(SEED.channel);
  const [notifData, setNotifData]         = useState(() => buildInitialNotifData());

  const handleEventToggle = (id, val) =>
    setEvents(prev => prev.map(e => e.id === id ? { ...e, enabled: val } : e));

  const handleNotifToggle = (moduleId, eventId, channelId, val) => {
    setNotifData(prev => ({
      ...prev,
      [moduleId]: {
        ...prev[moduleId],
        [eventId]: { ...prev[moduleId][eventId], [channelId]: val },
      },
    }));
  };

  const handleClone = (t) => {
    const clone = { ...t, id:t.id+'_copy', name:t.name+'_copy', isDefault:false, status:'pending', qualityRating:null, deliveryRate:null, readRate:null };
    setTemplates(prev => [...prev, clone]);
    setEditingTemplate(clone);
  };

  const handleSaveTemplate = (updated) => {
    setTemplates(prev => {
      const exists = prev.find(t => t.id === updated.id);
      return exists ? prev.map(t => t.id === updated.id ? updated : t) : [...prev, updated];
    });
  };

  const handleWizardComplete = ({ phone, form }) => {
    setChannel(ch => ({
      ...ch,
      isBYO: true,
      senderName: form.wabaName || 'My WABA',
      displayName: form.displayName || 'Brand',
      phoneNumber: phone || '+91 98765 43210',
      tier: '1K',
      qualityRating: null,
    }));
  };

  return (
    <div style={{ display:'flex', height:'100vh', width:'100%', overflow:'hidden' }}>
      <WASidebar active="whatsapp" />

      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Page header */}
        <div style={appStyles.pageHeader}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={appStyles.waIconWrap}>
              <Icon name="whatsapp" size={18} />
            </div>
            <div>
              <div style={appStyles.pageTitle}>WhatsApp Notifications</div>
              <div style={appStyles.pageBreadcrumb}>Settings</div>
            </div>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {channel.isBYO && (
              <span style={{ display:'inline-flex', alignItems:'center', gap:5, height:34, padding:'0 10px', borderRadius:'var(--radius-sm)', background:'#E7F8EE', color:'#25D366', fontSize:12, fontWeight:600 }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m5 12 5 5 9-10"/></svg>
                BYO WABA active
              </span>
            )}
            <a href="https://business.facebook.com" target="_blank" rel="noreferrer" style={appStyles.btnLink}>
              <Icon name="external" size={13} /> Meta Business Manager
            </a>
          </div>
        </div>

        {/* Tab bar */}
        <div style={appStyles.tabBar}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ ...appStyles.tabBtn, ...(tab===t.id ? appStyles.tabBtnActive : {}) }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Content */}
        <div style={appStyles.contentArea}>
          {tab === 'overview' && (
            <WAOverview
              data={{ channel, stats:SEED.stats, events }}
              onEventToggle={handleEventToggle}
              onUpgradeWABA={() => setShowWizard(true)}
            />
          )}
          {tab === 'notifications' && (
            <WAEventNotifications
              notifData={notifData}
              onToggle={handleNotifToggle}
              onOpenTemplate={() => setTab('templates')}
            />
          )}
          {tab === 'templates' && (
            <WATemplates
              templates={templates}
              onEdit={setEditingTemplate}
              onClone={handleClone}
              onNewTemplate={() => setShowNewTemplate(true)}
            />
          )}
          {tab === 'activity' && (
            <WAActivity logs={SEED.logs} />
          )}
        </div>
      </div>

      {editingTemplate && (
        <WAEditor
          template={editingTemplate}
          onClose={() => setEditingTemplate(null)}
          onSave={handleSaveTemplate}
        />
      )}

      {showNewTemplate && (
        <WANewTemplate
          onClose={() => setShowNewTemplate(false)}
          onSave={handleSaveTemplate}
        />
      )}

      {showWizard && (
        <WABAWizard
          onClose={() => setShowWizard(false)}
          onComplete={handleWizardComplete}
        />
      )}
    </div>
  );
}

const appStyles = {
  pageHeader: {
    display:'flex', alignItems:'center', justifyContent:'space-between',
    padding:'16px 28px 14px', borderBottom:'1px solid var(--border-default)',

  },
  waIconWrap: {
    width:36, height:36, borderRadius:10,
    background:'#E7F8EE', color:'#25D366',
    display:'grid', placeItems:'center', flexShrink:0,

  pageTitle: { fontSize:16, fontWeight:700, color:'var(--fg-1)', letterSpacing:'-0.02em' },
  pageBreadcrumb: { fontSize:12, color:'var(--fg-2)', marginTop:1 },
  btnLink: {
    height:34, padding:'0 12px', borderRadius:'var(--radius-sm)',
    border:'1px solid var(--border-default)', background:'var(--bg-surface)',
    fontSize:13, fontWeight:500, color:'var(--fg-2)', cursor:'pointer',
    display:'inline-flex', alignItems:'center', gap:6, textDecoration:'none',
  },
  tabBar: {
    display:'flex', gap:0, padding:'0 28px',
    borderBottom:'1px solid var(--border-default)',
    background:'var(--bg-surface)', flexShrink:0,
  },
  tabBtn: {
    height:42, padding:'0 16px', border:'none', background:'none',
    fontSize:14, fontWeight:500, color:'var(--fg-2)', cursor:'pointer',
    borderBottom:'2px solid transparent', marginBottom:'-1px', transition:'color .1s',
  },
  tabBtnActive: { color:'var(--brand-blue)', borderBottomColor:'var(--brand-blue)' },
  contentArea: { flex:1, overflowY:'auto', padding:'24px 28px' },
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
